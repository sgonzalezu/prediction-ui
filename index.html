<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Transporte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Predicción de Transporte en Spaceship Titanic</h1>
    <form id="predictionForm">
        <label for="HomePlanet">Planeta de Origen:</label>
        <select id="HomePlanet" required>
            <option value="Europa">Europa</option>
            <option value="Earth">Earth</option>
            <option value="Mars">Mars</option>
        </select><br>

        <label for="CryoSleep">¿En Criogenia?</label>
        <select id="CryoSleep" required>
            <option value="true">Sí</option>
            <option value="false">No</option>
        </select><br>

        <label for="Age">Edad:</label>
        <input type="number" id="Age" required><br>

        <label for="VIP">¿Es VIP?</label>
        <select id="VIP" required>
            <option value="true">Sí</option>
            <option value="false">No</option>
        </select><br>

        <label for="RoomService">Gasto en RoomService:</label>
        <input type="number" id="RoomService" required><br>

        <label for="FoodCourt">Gasto en FoodCourt:</label>
        <input type="number" id="FoodCourt" required><br>

        <label for="ShoppingMall">Gasto en ShoppingMall:</label>
        <input type="number" id="ShoppingMall" required><br>

        <label for="Spa">Gasto en Spa:</label>
        <input type="number" id="Spa" required><br>

        <label for="VRDeck">Gasto en VRDeck:</label>
        <input type="number" id="VRDeck" required><br>

        <button type="submit">Obtener Predicción</button>
    </form>
    
    <h2>Resultado:</h2>
    <p id="result">Esperando datos...</p>

    <script src="script.js"></script>
</body>
</html>
